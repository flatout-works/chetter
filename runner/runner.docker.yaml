server:
  url: http://host.docker.internal:8080
  auth_token: ""

runner:
  workspace_root: /var/lib/runner
  max_concurrent: 10

proxy:
  listen_addr: :18080
  allowed_domains:
    - api.openai.com
    - api.anthropic.com
    - api.deepseek.com
    - opencode.ai
    - api.synthetic.new
    - api.groq.com
    - api.mistral.ai
    - html.duckduckgo.com
    - lite.duckduckgo.com
    - www.google.com
    - bing.com
    - github.com
    - raw.githubusercontent.com
    - objects.githubusercontent.com
    - docs.python.org
    - pkg.go.dev
    - developer.mozilla.org
    - api.mem9.ai
    - api.osv.dev
    - registry.npmjs.org
    - npmjs.org
  blocked_domains:
    - webhook.site
    - requestbin.com
    - paste.opendev.org
    - pastebin.com
    - discord.com
    - hooks.slack.com
    - zpr.io

dns:
  listen_addr: :53
  upstream: 8.8.8.8:53
  blocked_domains:
    - metadata.google.internal
    - instance-data
    - 169.254.169.254

workspace: {}

git:
  ssh_key_path: ""
  pat: ""

chetter_mcp:
  url: ""
  auth_token: ""
