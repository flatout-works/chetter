name: Chetter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check chetter
        run: make check

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      runner-base: ${{ steps.filter.outputs.runner-base }}
      mcp: ${{ steps.filter.outputs.mcp }}
      runner: ${{ steps.filter.outputs.runner }}
      variant-golang: ${{ steps.filter.outputs.variant-golang }}
      variant-python: ${{ steps.filter.outputs.variant-python }}
      variant-node: ${{ steps.filter.outputs.variant-node }}
      variant-rust: ${{ steps.filter.outputs.variant-rust }}
      variant-minimal: ${{ steps.filter.outputs.variant-minimal }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            runner-base:
              - runner/Dockerfile.chetter-base
            mcp:
              - Dockerfile
              - main.go
              - internal/**
              - db/**
              - go.mod
              - go.sum
              - proto/**
              - gen/**
              - cmd/**
            runner:
              - runner/Dockerfile.chetter
              - runner/cmd/**
              - runner/harness/**
              - runner/internal/**
              - runner/go.mod
              - runner/go.sum
              - runner/chetter-entrypoint.sh
              - tools/skills/**
              - .opencode/agent/**
            variant-golang:
              - runner/images/golang/Dockerfile
            variant-python:
              - runner/images/python/Dockerfile
            variant-node:
              - runner/images/node/Dockerfile
            variant-rust:
              - runner/images/rust/Dockerfile
            variant-minimal:
              - runner/images/minimal/Dockerfile

  arcane-build-deploy:
    runs-on: ubuntu-latest
    needs: [check, detect-changes]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Build images on wowbagger
        env:
          BUILD_BASE: ${{ needs.detect-changes.outputs.runner-base }}
          BUILD_VARIANT_GOLANG: ${{ needs.detect-changes.outputs.variant-golang }}
          BUILD_VARIANT_PYTHON: ${{ needs.detect-changes.outputs.variant-python }}
          BUILD_VARIANT_NODE: ${{ needs.detect-changes.outputs.variant-node }}
          BUILD_VARIANT_RUST: ${{ needs.detect-changes.outputs.variant-rust }}
          BUILD_VARIANT_MINIMAL: ${{ needs.detect-changes.outputs.variant-minimal }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WOWBAGGER_SSH_KEY }}" > ~/.ssh/wowbagger
          chmod 600 ~/.ssh/wowbagger
          # Upload updated build script
          scp -o StrictHostKeyChecking=no -i ~/.ssh/wowbagger \
            ci/chetter-build.sh gokr@wowbagger.krampe.se:~/chetter-build.sh
          # Build with variant flags
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/wowbagger gokr@wowbagger.krampe.se \
            "BUILD_BASE='$BUILD_BASE' \
             BUILD_VARIANT_GOLANG='$BUILD_VARIANT_GOLANG' \
             BUILD_VARIANT_PYTHON='$BUILD_VARIANT_PYTHON' \
             BUILD_VARIANT_NODE='$BUILD_VARIANT_NODE' \
             BUILD_VARIANT_RUST='$BUILD_VARIANT_RUST' \
             BUILD_VARIANT_MINIMAL='$BUILD_VARIANT_MINIMAL' \
             bash ~/chetter-build.sh"

      - name: Drain runners before redeploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WOWBAGGER_SSH_KEY }}" > ~/.ssh/wowbagger
          chmod 600 ~/.ssh/wowbagger
          scp -o StrictHostKeyChecking=no -i ~/.ssh/wowbagger \
            ci/drain-runners.sh gokr@wowbagger.krampe.se:~/drain-runners.sh
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/wowbagger gokr@wowbagger.krampe.se \
            'cd ~/chetter && export $(grep -v "^#" .env | xargs) 2>/dev/null; DRAIN_TIMEOUT_SEC=600 bash ~/drain-runners.sh'

      - name: Sync and redeploy with Arcane
        env:
          ARCANE_URL: ${{ secrets.ARCANE_URL }}
          ARCANE_API_KEY: ${{ secrets.ARCANE_API_KEY }}
          ARCANE_CHETTER_PROJECT_ID: ${{ secrets.ARCANE_CHETTER_PROJECT_ID }}
          ARCANE_CHETTER_GITOPS_ID: ${{ secrets.ARCANE_CHETTER_GITOPS_ID }}
        run: |
          set -euo pipefail
          arcane_url="${ARCANE_URL%/}"
          # Sync GitOps to pull latest deploy/compose.yaml
          curl --silent --show-error --request POST \
            --header "X-Api-Key: $ARCANE_API_KEY" \
            "${arcane_url}/api/environments/0/gitops-syncs/$ARCANE_CHETTER_GITOPS_ID/sync" >/dev/null
          # Redeploy to pick up new images and compose changes
          curl --silent --show-error --request POST \
            --header "X-Api-Key: $ARCANE_API_KEY" \
            --header "Content-Type: application/json" \
            --data '{"forceRecreate":true,"removeOrphans":true}' \
            "${arcane_url}/api/environments/0/projects/$ARCANE_CHETTER_PROJECT_ID/redeploy" >/dev/null

  # -----------------------------------------------------------------------
  # Chetter CI — image rebuilds trigger
  # -----------------------------------------------------------------------
  # Images are built on wowbagger (via ~/chetter-build.sh) to save GitHub
  # Actions minutes. The CI only needs to SSH in and trigger the build,
  # then ask Arcane to redeploy and pull the new images.
