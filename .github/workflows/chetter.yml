name: Chetter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check chetter
        run: make check

  build-images:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        run: |
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "::notice::GHCR_TOKEN secret is not configured; skipping image build"
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
        id: login
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push chetter-runner-base
        if: steps.login.outputs.skip_build != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile.chetter-base
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/chetter-runner-base:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push chetter-mcp
        if: steps.login.outputs.skip_build != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/chetter-mcp:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push chetter-runner
        if: steps.login.outputs.skip_build != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile.chetter
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/chetter-runner:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  arcane-sync:
    runs-on: ubuntu-latest
    if: always() && needs.check.result == 'success'
    needs: [check, build-images]
    steps:
      - name: Trigger Arcane redeploy
        env:
          ARCANE_CHETTER_GITSYNC_URL: ${{ secrets.ARCANE_CHETTER_GITSYNC_URL }}
          ARCANE_CHETTER_REDEPLOY_URL: ${{ secrets.ARCANE_CHETTER_REDEPLOY_URL }}
        run: |
          url="${ARCANE_CHETTER_GITSYNC_URL:-$ARCANE_CHETTER_REDEPLOY_URL}"
          if [ -z "$url" ]; then
            echo "::notice::Arcane webhook secret is not configured; skipping Arcane sync"
            exit 0
          fi
          curl --fail --silent --show-error --max-time 180 --request POST "$url" >/dev/null
