name: Chetter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check chetter
        run: make check

  wowbagger-rebuild:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Trigger wowbagger rebuild
        env:
          ARCANE_CHETTER_REBUILD_URL: ${{ secrets.ARCANE_CHETTER_REBUILD_URL }}
        run: |
          url="$ARCANE_CHETTER_REBUILD_URL"
          if [ -z "$url" ]; then
            echo "::notice::Arcane webhook secret is not configured; skipping rebuild"
            exit 0
          fi
          curl --fail --silent --show-error --max-time 180 --request POST "$url" >/dev/null
