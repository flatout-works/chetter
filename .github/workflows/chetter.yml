name: Chetter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check chetter
        run: make check

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      runner-base: ${{ steps.filter.outputs.runner-base }}
      mcp: ${{ steps.filter.outputs.mcp }}
      runner: ${{ steps.filter.outputs.runner }}
      variant-golang: ${{ steps.filter.outputs.variant-golang }}
      variant-python: ${{ steps.filter.outputs.variant-python }}
      variant-node: ${{ steps.filter.outputs.variant-node }}
      variant-rust: ${{ steps.filter.outputs.variant-rust }}
      variant-minimal: ${{ steps.filter.outputs.variant-minimal }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            runner-base:
              - runner/Dockerfile.chetter-base
            mcp:
              - Dockerfile
              - main.go
              - internal/**
              - db/**
              - go.mod
              - go.sum
              - proto/**
              - gen/**
              - cmd/**
            runner:
              - runner/Dockerfile.chetter
              - runner/cmd/**
              - runner/harness/**
              - runner/internal/**
              - runner/go.mod
              - runner/go.sum
              - runner/chetter-entrypoint.sh
              - tools/skills/**
              - .opencode/agent/**
            variant-golang:
              - runner/images/golang/Dockerfile
            variant-python:
              - runner/images/python/Dockerfile
            variant-node:
              - runner/images/node/Dockerfile
            variant-rust:
              - runner/images/rust/Dockerfile
            variant-minimal:
              - runner/images/minimal/Dockerfile

  arcane-build-deploy:
    runs-on: ubuntu-latest
    needs: [check, detect-changes]
    timeout-minutes: 240
    steps:
      - name: Build and deploy with Arcane
        env:
          ARCANE_URL: ${{ secrets.ARCANE_URL }}
          ARCANE_API_KEY: ${{ secrets.ARCANE_API_KEY }}
          ARCANE_CHETTER_PROJECT_ID: ${{ secrets.ARCANE_CHETTER_PROJECT_ID }}
          ARCANE_CHETTER_GITOPS_ID: ${{ secrets.ARCANE_CHETTER_GITOPS_ID }}
          ARCANE_ENVIRONMENT_ID: ${{ vars.ARCANE_ENVIRONMENT_ID }}
          CHANGED_RUNNER_BASE: ${{ needs.detect-changes.outputs.runner-base }}
          CHANGED_MCP: ${{ needs.detect-changes.outputs.mcp }}
          CHANGED_RUNNER: ${{ needs.detect-changes.outputs.runner }}
          CHANGED_VARIANT_GOLANG: ${{ needs.detect-changes.outputs.variant-golang }}
          CHANGED_VARIANT_PYTHON: ${{ needs.detect-changes.outputs.variant-python }}
          CHANGED_VARIANT_NODE: ${{ needs.detect-changes.outputs.variant-node }}
          CHANGED_VARIANT_RUST: ${{ needs.detect-changes.outputs.variant-rust }}
          CHANGED_VARIANT_MINIMAL: ${{ needs.detect-changes.outputs.variant-minimal }}
        run: |
          set -euo pipefail

          missing=""
          for name in ARCANE_URL ARCANE_API_KEY ARCANE_CHETTER_PROJECT_ID ARCANE_CHETTER_GITOPS_ID; do
            if [ -z "${!name:-}" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required Arcane configuration:$missing"
            exit 1
          fi

          arcane_url="${ARCANE_URL%/}"
          env_id="${ARCANE_ENVIRONMENT_ID:-0}"

          call_arcane() {
            method="$1"
            path="$2"
            data="${3:-}"
            max_retries=3
            retry=0
            while true; do
              response_file="$(mktemp)"
              if [ -n "$data" ]; then
                status=$(curl --silent --show-error --max-time 14400 \
                  --write-out "%{http_code}" \
                  --output "$response_file" \
                  --request "$method" \
                  --header "X-Api-Key: $ARCANE_API_KEY" \
                  --header "Content-Type: application/json" \
                  --data "$data" \
                  "$arcane_url/api$path")
              else
                status=$(curl --silent --show-error --max-time 14400 \
                  --write-out "%{http_code}" \
                  --output "$response_file" \
                  --request "$method" \
                  --header "X-Api-Key: $ARCANE_API_KEY" \
                  "$arcane_url/api$path")
              fi
              if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
                cat "$response_file"
                rm -f "$response_file"
                return 0
              fi
              retry=$((retry + 1))
              if [ "$retry" -ge "$max_retries" ] || [ "$status" -lt 500 ]; then
                cat "$response_file" >&2
                rm -f "$response_file"
                return 1
              fi
              echo "::warning::Arcane API returned $status, retrying ($retry/$max_retries)..."
              rm -f "$response_file"
              sleep 5
            done
          }

          echo "Syncing Chetter GitOps project"
          sync_response=$(call_arcane POST "/environments/$env_id/gitops-syncs/$ARCANE_CHETTER_GITOPS_ID/sync")
          echo "GitOps sync response: $sync_response"

          project_dir=$(call_arcane GET "/environments/$env_id/projects/$ARCANE_CHETTER_PROJECT_ID" | jq -r '.data.path // .path')
          if [ -z "$project_dir" ] || [ "$project_dir" = "null" ]; then
            echo "::error::Could not resolve Arcane project directory"
            exit 1
          fi

          # Runner base image — only rebuild if Dockerfile changed
          if [ "$CHANGED_RUNNER_BASE" = "true" ]; then
            echo "Building and pushing runner base image"
            call_arcane POST "/environments/$env_id/images/build" \
              "$(jq -nc --arg contextDir "$project_dir" '{contextDir:$contextDir,dockerfile:"runner/Dockerfile.chetter-base",tags:["ghcr.io/flatout-works/chetter-runner-base:main"],provider:"local",push:true,load:true}')" >/dev/null
          else
            echo "Runner base image unchanged, skipping build"
          fi

          # MCP image — only rebuild if server code changed
          if [ "$CHANGED_MCP" = "true" ]; then
            echo "Building and pushing MCP image"
            mcp_build_response=$(call_arcane POST "/environments/$env_id/images/build" \
              "$(jq -nc --arg contextDir "$project_dir" --arg cachebust "${GITHUB_SHA:0:7}" '{contextDir:$contextDir,dockerfile:"Dockerfile",tags:["ghcr.io/flatout-works/chetter-mcp:main"],buildArgs:{CACHEBUST:$cachebust},provider:"local",push:true,load:true}')")
            echo "MCP build response: $mcp_build_response"
          else
            echo "MCP image unchanged, skipping build"
          fi

          # Runner app image — rebuild if runner code, skills, or base changed
          if [ "$CHANGED_RUNNER" = "true" ] || [ "$CHANGED_RUNNER_BASE" = "true" ]; then
            echo "Building and pushing runner image"
            runner_build_response=$(call_arcane POST "/environments/$env_id/images/build" \
              "$(jq -nc --arg contextDir "$project_dir" --arg cachebust "${GITHUB_SHA:0:7}" '{contextDir:$contextDir,dockerfile:"runner/Dockerfile.chetter",tags:["ghcr.io/flatout-works/chetter-runner:main"],buildArgs:{BASE_IMAGE:"ghcr.io/flatout-works/chetter-runner-base:main",CACHEBUST:$cachebust},provider:"local",push:true,load:true}')")
            echo "Runner build response: $runner_build_response"
          else
            echo "Runner image unchanged, skipping build"
          fi

          # Variant images
          build_variant() {
            local variant="$1"
            local dockerfile="runner/images/$variant/Dockerfile"
            local tag="ghcr.io/flatout-works/chetter-runner:main-${variant}"
            echo "Building and pushing ${variant} variant"
            call_arcane POST "/environments/$env_id/images/build" \
              "$(jq -nc --arg contextDir "$project_dir" --arg dockerfile "$dockerfile" --arg tag "$tag" '{contextDir:$contextDir,dockerfile:$dockerfile,tags:[$tag],provider:"local",push:true,load:true}')" >/dev/null
          }

          if [ "$CHANGED_VARIANT_GOLANG" = "true" ] || [ "$CHANGED_RUNNER_BASE" = "true" ]; then
            build_variant golang
          fi
          if [ "$CHANGED_VARIANT_PYTHON" = "true" ] || [ "$CHANGED_RUNNER_BASE" = "true" ]; then
            build_variant python
          fi
          if [ "$CHANGED_VARIANT_NODE" = "true" ] || [ "$CHANGED_RUNNER_BASE" = "true" ]; then
            build_variant node
          fi
          if [ "$CHANGED_VARIANT_RUST" = "true" ] || [ "$CHANGED_RUNNER_BASE" = "true" ]; then
            build_variant rust
          fi
          if [ "$CHANGED_VARIANT_MINIMAL" = "true" ]; then
            build_variant minimal
          fi

          echo "Redeploying Chetter project"
          call_arcane POST "/environments/$env_id/projects/$ARCANE_CHETTER_PROJECT_ID/redeploy" \
            '{"forceRecreate":true,"pullPolicy":"always","removeOrphans":true}' >/dev/null
