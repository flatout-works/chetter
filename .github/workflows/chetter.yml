name: Chetter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # needed to push chetter-agent-base to GHCR

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            runner/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Check chetter
        run: make check

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      agent-base: ${{ steps.filter.outputs.agent-base }}
      mcp: ${{ steps.filter.outputs.mcp }}
      runner: ${{ steps.filter.outputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agent-base:
              - runner/images/base/Dockerfile
            mcp:
              - Dockerfile
              - main.go
              - internal/**
              - web/**
              - db/**
              - go.mod
              - go.sum
              - proto/**
              - gen/**
              - cmd/**
            runner:
              - runner/Dockerfile.chetter
              - runner/cmd/**
              - runner/harness/**
              - runner/internal/**
              - runner/go.mod
              - runner/go.sum
              - runner/chetter-entrypoint.sh
              - tools/skills/**
              - .opencode/agent/**

  arcane-build-deploy:
    runs-on: ubuntu-latest
    needs: [check, detect-changes]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Build images on wowbagger
        env:
          BUILD_AGENT_BASE: ${{ needs.detect-changes.outputs.agent-base }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WOWBAGGER_SSH_KEY }}" > ~/.ssh/wowbagger
          chmod 600 ~/.ssh/wowbagger
          # Upload updated build script
          scp -o StrictHostKeyChecking=no -i ~/.ssh/wowbagger \
            ci/chetter-build.sh gokr@wowbagger.krampe.se:~/chetter-build.sh
          # Build
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/wowbagger gokr@wowbagger.krampe.se \
            "BUILD_AGENT_BASE='$BUILD_AGENT_BASE' \
             GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
             bash ~/chetter-build.sh"

      - name: Drain runners before redeploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WOWBAGGER_SSH_KEY }}" > ~/.ssh/wowbagger
          chmod 600 ~/.ssh/wowbagger
          scp -o StrictHostKeyChecking=no -i ~/.ssh/wowbagger \
            ci/drain-runners.sh gokr@wowbagger.krampe.se:~/drain-runners.sh
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/wowbagger gokr@wowbagger.krampe.se \
            'DRAIN_TIMEOUT_SEC=600 bash ~/drain-runners.sh' || echo "WARNING: drain failed — redeploying anyway"

      - name: Sync and redeploy with Arcane
        env:
          ARCANE_URL: ${{ secrets.ARCANE_URL }}
          ARCANE_API_KEY: ${{ secrets.ARCANE_API_KEY }}
          ARCANE_CHETTER_PROJECT_ID: ${{ secrets.ARCANE_CHETTER_PROJECT_ID }}
          ARCANE_CHETTER_GITOPS_ID: ${{ secrets.ARCANE_CHETTER_GITOPS_ID }}
        run: |
          set -euo pipefail
          arcane_url="${ARCANE_URL%/}"
          # Sync GitOps to pull latest deploy/compose.yaml
          curl --silent --show-error --request POST \
            --header "X-Api-Key: $ARCANE_API_KEY" \
            "${arcane_url}/api/environments/0/gitops-syncs/$ARCANE_CHETTER_GITOPS_ID/sync" >/dev/null
          # Redeploy to pick up new images and compose changes
          curl --silent --show-error --request POST \
            --header "X-Api-Key: $ARCANE_API_KEY" \
            --header "Content-Type: application/json" \
            --data '{"forceRecreate":true,"removeOrphans":true}' \
            "${arcane_url}/api/environments/0/projects/$ARCANE_CHETTER_PROJECT_ID/redeploy" >/dev/null

  # -----------------------------------------------------------------------
  # Chetter CI — image rebuilds trigger
  # -----------------------------------------------------------------------
  # Images are built on wowbagger (via ~/chetter-build.sh) to save GitHub
  # Actions minutes. The CI only needs to SSH in and trigger the build,
  # then ask Arcane to redeploy and pull the new images.
