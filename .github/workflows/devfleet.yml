name: Devfleet

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DEVFLEET_MCP_IMAGE: ghcr.io/devfleet/devfleet-mcp
  DEVFLEET_RUNNER_IMAGE: ghcr.io/devfleet/devfleet-runner
  DEVFLEET_RUNNER_BASE_IMAGE: ghcr.io/devfleet/devfleet-runner-base

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check devfleet
        run: make check

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DEVFLEET_MCP_IMAGE }}:${{ github.sha }}
            ${{ env.DEVFLEET_MCP_IMAGE }}:main
          cache-from: |
            type=registry,ref=${{ env.DEVFLEET_MCP_IMAGE }}:main
          cache-to: |
            type=registry,ref=${{ env.DEVFLEET_MCP_IMAGE }}:cache,mode=max
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runner/Dockerfile.devfleet-base
          push: true
          tags: |
            ${{ env.DEVFLEET_RUNNER_BASE_IMAGE }}:${{ github.sha }}
            ${{ env.DEVFLEET_RUNNER_BASE_IMAGE }}:main
          cache-from: |
            type=registry,ref=${{ env.DEVFLEET_RUNNER_BASE_IMAGE }}:main
          cache-to: |
            type=registry,ref=${{ env.DEVFLEET_RUNNER_BASE_IMAGE }}:cache,mode=max
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runner/Dockerfile.devfleet
          push: true
          tags: |
            ${{ env.DEVFLEET_RUNNER_IMAGE }}:${{ github.sha }}
            ${{ env.DEVFLEET_RUNNER_IMAGE }}:main
          cache-from: |
            type=registry,ref=${{ env.DEVFLEET_RUNNER_IMAGE }}:main
            type=registry,ref=${{ env.DEVFLEET_RUNNER_BASE_IMAGE }}:cache
          cache-to: |
            type=registry,ref=${{ env.DEVFLEET_RUNNER_IMAGE }}:cache,mode=max
      - name: Trigger Arcane redeploy
        env:
          ARCANE_DEVFLEET_REDEPLOY_URL: ${{ secrets.ARCANE_DEVFLEET_REDEPLOY_URL }}
        run: |
          if [ -z "$ARCANE_DEVFLEET_REDEPLOY_URL" ]; then
            echo "::notice::ARCANE_DEVFLEET_REDEPLOY_URL is not configured; skipping Arcane redeploy"
            exit 0
          fi
          curl --fail --silent --show-error --max-time 180 --request POST "$ARCANE_DEVFLEET_REDEPLOY_URL" >/dev/null
