# yaml-language-server: $schema=../../schemas/model-catalog.schema.json
version: 1
default_provider: anthropic
default_model: claude-sonnet-4
defaults:
  opencode:
    provider: anthropic
    model: claude-sonnet-4
  claude-code:
    provider: anthropic
    model: claude-sonnet-4
  codewhale:
    provider: anthropic
    model: claude-sonnet-4
  codex:
    provider: openai
    model: gpt-5.4
providers:
  anthropic:
    name: Anthropic
    kind: native
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    models:
      - id: claude-sonnet-4
        name: Claude Sonnet 4
  google:
    name: Google
    kind: openai_compatible
    base_url: https://generativelanguage.googleapis.com
    api_key_env: GOOGLE_API_KEY
    models:
      - id: gemini-2.5-pro
        name: Gemini 2.5 Pro
  openai:
    name: OpenAI
    kind: native
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    models:
      - id: gpt-5.4
        name: GPT-5.4
