# yaml-language-server: $schema=../../../schemas/trigger.schema.json
# Example trigger: daily code review
#
# Customize before enabling:
#   git_url  - your repository URL
#   git_ref  - branch to work from (usually main)
#   agent    - agent to use (defined in global/agents/*.md)
#   skills   - skills to load (defined in skills/*/)
#   prompt   - adjust the task description

name: example-daily-review
enabled: false
cron_expr: "0 6 * * 1-5"
git_url: https://github.com/your-org/your-repo
git_ref: main
agent: example
skills:
  - example
timeout_sec: 1800
prompt: |-
  Review recent changes and open issues in the repository.
  Summarize key findings and create comments or issues as needed.

  Add this footer to any created issues or pull requests:

      ---
      Generated by [Chetter](https://github.com/flatout-works/chetter)
