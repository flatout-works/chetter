name: next-feature-creator
enabled: true
cron_expr: "*/30 * * * *"
git_url: https://github.com/flatout-works/chetter
git_ref: main
agent_image: chetter-runner:latest
timeout_sec: 1800
prompt: |-
  Analyze this repository's documentation, CHANGELOG.md, open GitHub issues, codebase gaps, and recent development trajectory to propose and create a GitHub issue for the next most impactful feature, fix, or refactoring the project should focus on.

  Steps:
  1. Read CHANGELOG.md to understand what was recently done and the development trajectory
  2. Read docs/ directory for planned features, proposals, and known gaps
  3. Check open GitHub issues via `gh issue list` to avoid duplicates
  4. Scan the codebase for TODOs, FIXMEs, missing tests, stale code, and gaps
  5. Evaluate which item would have the highest impact relative to effort
  6. Create a well-structured GitHub issue with summary, acceptance criteria, and rationale

  Prioritize: operational resilience > missing features > refactoring > documentation updates. Avoid creating issues that duplicate existing open ones. Focus on actionable, well-scoped work rather than vague epics.

  When creating the issue, append this footer to the issue body, resolving the environment
  variables $CHETTER_AGENT_NAME, $CHETTER_MODEL_ID, $CHETTER_RUNNER_IMAGE,
  and $CHETTER_RUNNER_IMAGE_DIGEST:

      ---
      Generated by [Chetter](https://github.com/flatout-works/chetter)
      Agent: $CHETTER_AGENT_NAME | Model: $CHETTER_MODEL_ID | Task: $CHETTER_TASK_ID | Runner: $CHETTER_RUNNER_IMAGE ($CHETTER_RUNNER_IMAGE_DIGEST)

  If no new issue is warranted (all gaps are already captured), report that and exit without creating a duplicate.
