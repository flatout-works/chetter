syntax = "proto3";

package runner.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/flatout-works/chetter/gen/runner/v1;runnerv1";

message RunnerInfo {
  string runner_id = 1 [(buf.validate.field).string.min_len = 1];
  string status = 2;
  string image_ref = 3;
  string image_digest = 4;
  string version = 5;
  int32 max_concurrent = 6;
  int32 running_tasks = 7;
  int32 available_slots = 8;
  int64 total_started = 9;
  int64 total_completed = 10;
  int64 total_errors = 11;
  repeated string current_task_ids = 12;
  string execution_mode = 13;
  string started_at = 14;
  bool gvisor_enabled = 15;
  bool checkpoint_restore = 16;
  string runsc_version = 17;
  repeated RunningExecution current_executions = 18;
}

message RunningExecution {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string execution_id = 2 [(buf.validate.field).string.min_len = 1];
  string agent_session_id = 3 [(buf.validate.field).string.min_len = 1];
  string user_prompt_id = 4 [(buf.validate.field).string.min_len = 1];
}

message RegisterRunnerRequest {
  RunnerInfo runner = 1 [(buf.validate.field).required = true];
}

message RegisterRunnerResponse {}

message HeartbeatRequest {
  RunnerInfo runner = 1 [(buf.validate.field).required = true];
}

message RunnerCommand {
  string type = 1;
  string task_id = 2;
  string reason = 3;
  string execution_id = 4;
  string agent_session_id = 5;
  string user_prompt_id = 6;
}

message HeartbeatResponse {
  repeated RunnerCommand commands = 1;
}

message ClaimTaskRequest {
  string runner_id = 1 [(buf.validate.field).string.min_len = 1];
  int32 wait_seconds = 2 [(buf.validate.field).int32.lte = 30];
  int32 lease_seconds = 3 [(buf.validate.field).int32.lte = 3600];
}

message Task {
  string task_id = 1;
  string agent_image = 2;
  string prompt = 3;
  string git_url = 4;
  string git_ref = 5;
  string agent = 6;
  string provider_id = 7;
  string model_id = 8;
  string variant_id = 9;
  repeated string skills = 10;
  int32 timeout_seconds = 11;
  int32 max_memory_mb = 12;
  int32 max_cpu = 13;
  map<string, string> env = 14;
  int32 attempt = 15;
  bool checkpoint_after_success = 16;
  string resume_checkpoint_path = 17;
  string resume_workspace_path = 18;
  string resume_harness_session_id = 19;
  string harness = 25;
  string provider_name = 20;
  string provider_base_url = 21;
  string provider_api_key_env = 22;
  string agent_definition = 23;
  map<string, bytes> skill_definitions = 24;
  map<string, bytes> extra_files = 26;
  string provider_api = 27;
  bool provider_auth_header = 28;
  string git_identity_id = 29;
  string git_author_name = 30;
  string git_author_email = 31;
  repeated MCPEndpoint mcp_endpoints = 32;
  string execution_id = 33 [(buf.validate.field).string.min_len = 1];
  string agent_session_id = 34 [(buf.validate.field).string.min_len = 1];
  string user_prompt_id = 35 [(buf.validate.field).string.min_len = 1];
}

message MCPEndpoint {
  string name = 1;
  string transport = 2;
  string url = 3;
  map<string, string> headers = 4;
  string bearer_token_env = 5;
}

message ClaimTaskResponse {
  Task task = 1;
}

message TokenUsage {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
  int64 cache_read_tokens = 3;
  int64 cache_write_tokens = 4;
  int64 reasoning_tokens = 5;
  int64 cost_cents = 6;
}

message TaskEvent {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string status = 2 [(buf.validate.field).string.min_len = 1];
  string summary = 3;
  string error = 4;
  repeated string artifacts = 5;
  string provider_id = 6;
  string model_id = 7;
  string variant_id = 8;
  string opencode_session_id = 9;
  string runner_image_digest = 10;
  string started_at = 11;
  string ended_at = 12;
  string payload_json = 13;
  string session_export = 14;
  string checkpoint_path = 15;
  string workspace_path = 16;
  string error_category = 17;
  TokenUsage token_usage = 18;
  string execution_id = 19 [(buf.validate.field).string.min_len = 1];
  string agent_session_id = 20 [(buf.validate.field).string.min_len = 1];
  string user_prompt_id = 21 [(buf.validate.field).string.min_len = 1];
}

message ReportTaskEventsRequest {
  string runner_id = 1 [(buf.validate.field).string.min_len = 1];
  repeated TaskEvent events = 2 [(buf.validate.field).repeated.min_items = 1];
}

message ReportTaskEventsResponse {}

message PruneWorkspacesRequest {
  reserved "task_ids";
  string runner_id = 1 [(buf.validate.field).string.min_len = 1];
  repeated WorkspaceCandidate candidates = 2;
}

message PruneWorkspacesResponse {
  repeated WorkspaceKey safe_to_delete = 1;
}

message WorkspaceCandidate {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string execution_id = 2 [(buf.validate.field).string.min_len = 1];
  string workspace_path = 3 [(buf.validate.field).string.min_len = 1];
}

message WorkspaceKey {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string execution_id = 2 [(buf.validate.field).string.min_len = 1];
}

message GitHubCreateIssueRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string repo = 2 [(buf.validate.field).string.min_len = 1];
  string title = 3 [(buf.validate.field).string.min_len = 1];
  string body = 4;
  repeated string labels = 5;
  string execution_id = 6 [(buf.validate.field).string.min_len = 1];
}

message GitHubCreateIssueResponse {
  int32 number = 1;
  string url = 2;
}

message GitHubIssueCommentRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string repo = 2 [(buf.validate.field).string.min_len = 1];
  int32 issue_number = 3 [(buf.validate.field).int32.gt = 0];
  string body = 4 [(buf.validate.field).string.min_len = 1];
  string execution_id = 5 [(buf.validate.field).string.min_len = 1];
}

message GitHubIssueCommentResponse {
  string url = 1;
}

message GitHubCreatePRRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string repo = 2 [(buf.validate.field).string.min_len = 1];
  string title = 3 [(buf.validate.field).string.min_len = 1];
  string body = 4;
  string head = 5 [(buf.validate.field).string.min_len = 1];
  string base = 6 [(buf.validate.field).string.min_len = 1];
  bool draft = 7;
  string execution_id = 8 [(buf.validate.field).string.min_len = 1];
}

message GitHubCreatePRResponse {
  int32 number = 1;
  string url = 2;
}

message GitHubPRReviewRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string repo = 2 [(buf.validate.field).string.min_len = 1];
  int32 pr_number = 3 [(buf.validate.field).int32.gt = 0];
  string body = 4 [(buf.validate.field).string.min_len = 1];
  string event = 5; // COMMENT | APPROVE | REQUEST_CHANGES; default COMMENT
  string execution_id = 6 [(buf.validate.field).string.min_len = 1];
}

message GitHubPRReviewResponse {
  string url = 1;
}

service RunnerService {
  rpc RegisterRunner(RegisterRunnerRequest) returns (RegisterRunnerResponse) {}
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {}
  rpc ClaimTask(ClaimTaskRequest) returns (ClaimTaskResponse) {}
  rpc ReportTaskEvents(ReportTaskEventsRequest) returns (ReportTaskEventsResponse) {}
  rpc PruneWorkspaces(PruneWorkspacesRequest) returns (PruneWorkspacesResponse) {}

  // GitHub operations — called by the runner on behalf of the agent.
  // The server performs the GitHub API call, appends the Chetter signature,
  // and records the artifact atomically, so the runner needs no GitHub token.
  rpc GitHubCreateIssue(GitHubCreateIssueRequest) returns (GitHubCreateIssueResponse) {}
  rpc GitHubIssueComment(GitHubIssueCommentRequest) returns (GitHubIssueCommentResponse) {}
  rpc GitHubCreatePR(GitHubCreatePRRequest) returns (GitHubCreatePRResponse) {}
  rpc GitHubPRReview(GitHubPRReviewRequest) returns (GitHubPRReviewResponse) {}
}
