apiVersion: apps/v1
kind: Deployment
metadata:
  name: chetter-runner
  namespace: chetter
spec:
  replicas: 4
  selector:
    matchLabels:
      app: chetter-runner
  template:
    metadata:
      labels:
        app: chetter-runner
    spec:
      containers:
      - name: runner
        image: ghcr.io/flatout-works/chetter-runner:main
        envFrom:
        - secretRef:
            name: chetter-secrets
        env:
        - name: CHETTER_SERVER_URL
          value: "http://chetter-mcp:8080"
        - name: CHETTER_RUNNER_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: chetter-secrets
              key: CHETTER_RUNNER_RPC_TOKEN
        - name: RUNNER_LOCAL
          value: "true"
        - name: RUNNER_MAX_CONCURRENT
          value: "2"
        - name: USE_GVISOR
          value: "false"
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: runner-data
          mountPath: /var/lib/chetter-runner
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
      - name: runner-data
        hostPath:
          path: /var/lib/chetter-runner
          type: DirectoryOrCreate
