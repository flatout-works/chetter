services:
  chetter-mcp:
    image: ghcr.io/flatout-works/chetter-mcp:main
    pull_policy: always
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8080
      DATABASE_DSN: ${DATABASE_DSN:-""}
      MCP_AUTH_TOKEN: ${CHETTER_MCP_AUTH_TOKEN:-""}
      ARCANE_SERVER_URL: ${ARCANE_SERVER_URL:-""}
      ARCANE_API_KEY: ${ARCANE_API_KEY:-""}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-""}
      GITHUB_APP_PRIVATE_KEY_B64: ${GITHUB_APP_PRIVATE_KEY_B64:-""}
      GITHUB_INSTALLATION_ID: ${GITHUB_INSTALLATION_ID:-""}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-""}
      GITHUB_REVIEW_ALLOWED_REPOS: ${GITHUB_REVIEW_ALLOWED_REPOS:-""}
      DEFAULT_AGENT_IMAGE: ghcr.io/flatout-works/chetter-runner:main
    ports:
      - "18088:8080"

  chetter-runner-base:
    profiles: ["build"]
    image: ghcr.io/flatout-works/chetter-runner-base:main
    build:
      context: ..
      dockerfile: runner/Dockerfile.chetter-base
    command: ["true"]

  chetter-runner:
    image: ghcr.io/flatout-works/chetter-runner:main
    pull_policy: always
    build:
      context: ..
      dockerfile: runner/Dockerfile.chetter
      args:
        BASE_IMAGE: ghcr.io/flatout-works/chetter-runner-base:main
    restart: unless-stopped
    depends_on:
      - chetter-mcp
    environment:
      RUNNER_LOCAL: "false"
      CHETTER_SERVER_URL: http://chetter-mcp:8080
      CHETTER_RUNNER_AUTH_TOKEN: ${CHETTER_MCP_AUTH_TOKEN:-""}
      HOST_WORKSPACE_ROOT: /var/lib/chetter-runner-1
      RUNNER_WORKSPACE_ROOT: /var/lib/chetter-runner/workspaces
      RUNNER_MAX_CONCURRENT: "1"
      USE_GVISOR: "true"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SYNTHETIC_API_KEY: ${SYNTHETIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MEM9_API_KEY: ${MEM9_API_KEY:-}
      MEM9_API_URL: ${MEM9_API_URL:-https://api.mem9.ai}
      MEM9_DEBUG: ${MEM9_DEBUG:-false}
      CHETTER_MCP_AUTH_TOKEN: ${CHETTER_MCP_AUTH_TOKEN:-}
      CHETTER_MCP_URL: http://chetter-mcp:8080
      CHETTER_RUNNER_IMAGE: ${CHETTER_RUNNER_IMAGE:-ghcr.io/flatout-works/chetter-runner:main}
      CHETTER_RUNNER_IMAGE_DIGEST: ${CHETTER_RUNNER_IMAGE_DIGEST:-}
    volumes:
      - /var/lib/chetter-runner-1:/var/lib/chetter-runner
      - /var/run/docker.sock:/var/run/docker.sock

  chetter-runner-2:
    image: ghcr.io/flatout-works/chetter-runner:main
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - chetter-mcp
    environment:
      RUNNER_LOCAL: "false"
      CHETTER_SERVER_URL: http://chetter-mcp:8080
      CHETTER_RUNNER_AUTH_TOKEN: ${CHETTER_MCP_AUTH_TOKEN:-}
      HOST_WORKSPACE_ROOT: /var/lib/chetter-runner-2
      RUNNER_WORKSPACE_ROOT: /var/lib/chetter-runner/workspaces
      RUNNER_MAX_CONCURRENT: "1"
      USE_GVISOR: "true"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-""}
      SYNTHETIC_API_KEY: ${SYNTHETIC_API_KEY:-""}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-""}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-""}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-""}
      MEM9_API_KEY: ${MEM9_API_KEY:-""}
      MEM9_API_URL: ${MEM9_API_URL:-https://api.mem9.ai}
      MEM9_DEBUG: ${MEM9_DEBUG:-false}
      CHETTER_MCP_AUTH_TOKEN: ${CHETTER_MCP_AUTH_TOKEN:-""}
      CHETTER_MCP_URL: http://chetter-mcp:8080
      CHETTER_RUNNER_IMAGE: ${CHETTER_RUNNER_IMAGE:-ghcr.io/flatout-works/chetter-runner:main}
      CHETTER_RUNNER_IMAGE_DIGEST: ${CHETTER_RUNNER_IMAGE_DIGEST:-""}
    volumes:
      - /var/lib/chetter-runner-2:/var/lib/chetter-runner
      - /var/run/docker.sock:/var/run/docker.sock
