services:
  tidb:
    image: pingcap/tidb:v8.5.1
    restart: unless-stopped
    command: --store=tikv --path=127.0.0.1:2379
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 4000 -u root -e 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - tidb-data:/var/lib/tidb

  chetter-mcp:
    depends_on:
      tidb:
        condition: service_healthy
    environment:
      DATABASE_DSN: ${DATABASE_DSN:-root@tcp(tidb:4000)/chetter?parseTime=true}

volumes:
  tidb-data:
