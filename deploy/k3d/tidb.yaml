apiVersion: v1
kind: Service
metadata:
  name: tidb
  namespace: chetter
spec:
  selector:
    app: tidb
  ports:
  - port: 4000
    targetPort: 4000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tidb
  namespace: chetter
spec:
  serviceName: tidb
  replicas: 1
  selector:
    matchLabels:
      app: tidb
  template:
    metadata:
      labels:
        app: tidb
    spec:
      containers:
      - name: tidb
        image: pingcap/tidb:v8.5.1
        args: ["--store=unistore", "--path=/data"]
        ports:
        - containerPort: 4000
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        livenessProbe:
          tcpSocket:
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
