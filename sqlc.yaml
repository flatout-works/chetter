version: "2"
sql:
  - engine: "mysql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "json"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
              pointer: true
          - db_type: "json"
            nullable: false
            go_type:
              import: "encoding/json"
              type: "RawMessage"
  - engine: "postgresql"
    queries: "db/postgres/queries"
    schema: "db/postgres/migrations"
    gen:
      go:
        package: "repositorypostgres"
        out: "internal/repositorypostgres"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
              pointer: true
          - db_type: "jsonb"
            nullable: false
            go_type:
              import: "encoding/json"
              type: "RawMessage"
